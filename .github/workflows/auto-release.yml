name: auto-release

# Three-line consumer shim. Every push to main runs the pleme-io
# substrate single-crate auto-release pipeline (bump -> commit -> tag ->
# push -> publish-to-crates.io). Uses the per-language reusable directly
# (the polymorphic auto-release.yml@main shim has a known startup_failure
# — see pleme-io/CLAUDE.md's AUTO-RELEASE section).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump-type:
        description: "patch | minor | major"
        required: false
        default: patch

jobs:
  release:
    uses: pleme-io/substrate/.github/workflows/cargo-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type || 'patch' }}
    secrets: inherit
